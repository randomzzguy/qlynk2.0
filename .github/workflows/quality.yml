name: Quality and security gates

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ci-placeholder-publishable-key
      SUPABASE_SERVICE_ROLE_KEY: ci-placeholder-service-role-key
      STRIPE_SECRET_KEY: sk_test_ci_placeholder
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_ci_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_ci_placeholder
      NEXT_PUBLIC_STRIPE_PRICE_CREATOR_MONTHLY: price_ci_creator_monthly
      NEXT_PUBLIC_STRIPE_PRICE_CREATOR_ANNUAL: price_ci_creator_annual
      NEXT_PUBLIC_STRIPE_PRICE_AGENCY_MONTHLY: price_ci_agency_monthly
      NEXT_PUBLIC_STRIPE_PRICE_AGENCY_ANNUAL: price_ci_agency_annual
      NEXT_PUBLIC_SITE_URL: https://www.qlynk.site
      GROQ_API_KEY: ci-placeholder
      HCAPTCHA_SECRET_KEY: ci-placeholder
      NEXT_PUBLIC_HCAPTCHA_SITE_KEY: ci-placeholder
      CRON_SECRET: ci-placeholder

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run lint
      - run: npm run verify:migrations
      - run: npm run build
      - name: Production HTTP smoke
        run: |
          npm start -- --hostname 127.0.0.1 --port 3100 > /tmp/qlynk-next.log 2>&1 &
          server_pid=$!
          trap 'kill $server_pid' EXIT
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:3100/api/health > /dev/null; then break; fi
            sleep 1
          done
          SMOKE_BASE_URL=http://127.0.0.1:3100 npm run verify:http
      - run: npm audit --omit=dev --audit-level=high
